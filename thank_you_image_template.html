<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We've received your message</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        .header {
            background: linear-gradient(to right, #ff8c2e, #ffb347);
            padding: 40px 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 28px;
            letter-spacing: 2px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .checkmark {
            margin: 40px 0 20px;
        }
        .checkmark img {
            width: 60px;
        }
        .content {
            padding: 0 40px;
        }
        .content h2 {
            font-size: 22px;
            color: #1a202c;
            margin-bottom: 20px;
        }
        .content p {
            font-size: 16px;
            line-height: 1.6;
            color: #4a5568;
            margin-bottom: 20px;
        }
        .footer {
            background-color: #105469;
            padding: 20px;
            margin-top: 40px;
            font-size: 12px;
            color: #ffffff;
            border-radius: 8px;
        }
        .footer a {
            color: #ff8c2e;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Orange Header Section -->
        <div class="header">
            <h1>NAVABHARATHA</h1>
        </div>

        <!-- Checkmark Icon -->
        <div class="checkmark">
            <img src="https://cdn-icons-png.flaticon.com/512/5290/5290058.png" alt="Success">
        </div>

        <!-- Main Content -->
        <div class="content">
            <h2>Thank You, {{name}}!</h2>
            <p>We have received your query. Our support team is reviewing it and will get back to you <strong>within 24 hours</strong>.</p>
            <p>If your matter is urgent, please contact us at +91-8213554589.</p>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>&copy; 2026 Navabharatha. All rights reserved.</p>
            <p><a href="https://www.navabharatha.com">www.navabharatha.com</a></p>
        </div>
    </div>
</body>
</html>
